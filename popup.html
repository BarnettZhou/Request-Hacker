<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      padding: 16px;
      background: #f5f5f5;
      color: #333;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 16px;
      color: #1976d2;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .btn-icon {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-icon:hover { background: #e3f2fd; }

    .rule-card {
      background: #fff;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #e0e0e0;
    }
    .rule-card.disabled {
      opacity: 0.6;
    }
    .rule-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .rule-name {
      font-size: 14px;
      font-weight: 600;
      word-break: break-all;
    }

    .toggle {
      width: 32px;
      height: 18px;
      border-radius: 9px;
      background: #ccc;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .toggle::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }
    .toggle.on {
      background: #4caf50;
    }
    .toggle.on::after {
      transform: translateX(14px);
    }

    .rule-url {
      font-size: 11px;
      color: #999;
      margin-bottom: 8px;
      word-break: break-all;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .tag {
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 11px;
      border: 1px solid #e0e0e0;
      background: #f5f5f5;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tag:hover {
      background: #e3f2fd;
      border-color: #1976d2;
      color: #1976d2;
    }
    .tag.active {
      background: #1976d2;
      border-color: #1976d2;
      color: #fff;
    }
    .tag.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .empty-state {
      text-align: center;
      padding: 24px;
      color: #999;
      font-size: 13px;
    }

    .footer {
      margin-top: 10px;
      text-align: center;
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Request Hacker</h1>
    <div class="header-actions">
      <button class="btn-icon" id="openOptionsBtn">⚙️ 配置</button>
    </div>
  </div>

  <div id="rulesContainer"></div>

  <div class="footer">拦截 fetch / XHR 请求</div>
  <script src="popup.js"></script>
</body>
</html>
